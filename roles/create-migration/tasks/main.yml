---
- name: Create temp directory for working files
  ansible.builtin.tempfile:
    state: directory
    prefix: px_migration_
  register: _work_dir

- name: Create migration
  block:
    - name: Write kubeconfig to temp file
      ansible.builtin.copy:
        content: "{{ kubeconfig }}"
        dest: "{{ _work_dir.path }}/kubeconfig"
        mode: "0600"
      no_log: true

    - name: Find a running Stork pod
      kubernetes.core.k8s_info:
        kubeconfig: "{{ _work_dir.path }}/kubeconfig"
        kind: Pod
        namespace: "{{ portworx_namespace }}"
        label_selectors:
          - "{{ stork_pod_label }}"
        field_selectors:
          - status.phase=Running
      register: _stork_pods

    - name: Fail if no Stork pod found
      ansible.builtin.fail:
        msg: "No running Stork pod found in {{ portworx_namespace }} namespace with label {{ stork_pod_label }}"
      when: _stork_pods.resources | length == 0

    - name: Set Stork pod name
      ansible.builtin.set_fact:
        _stork_pod: "{{ _stork_pods.resources[0].metadata.name }}"

    - name: Validate cluster pair configuration
      ansible.builtin.fail:
        msg: "Specify at least one of 'admin_cluster_pair' or 'cluster_pair'"
      when:
        - admin_cluster_pair | length == 0
        - cluster_pair | length == 0

    - name: Set cluster pair flag
      ansible.builtin.set_fact:
        _cluster_pair_flag: >-
          {{ '--admin-cluster-pair ' + admin_cluster_pair if admin_cluster_pair | length > 0
          else '--clusterPair ' + cluster_pair }}

    - name: Create Migration
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ _work_dir.path }}/kubeconfig"
        namespace: "{{ portworx_namespace }}"
        pod: "{{ _stork_pod }}"
        command: >-
          {{ stork_binary_path }} create migration {{ migration_name }}
          --namespace {{ dr_namespace }}
          {{ _cluster_pair_flag }}
          --namespaces {{ dr_namespace }}
      register: _create_migration_result
      failed_when: false

    - name: Verify migration was created or already exists
      ansible.builtin.fail:
        msg: "Failed to create migration: {{ _create_migration_result.stderr | default(_create_migration_result.stdout | default('unknown error')) }}"
      when:
        - _create_migration_result.return_code != 0
        - "'already exists' not in (_create_migration_result.stderr | default('') + _create_migration_result.stdout | default(''))"

  always:
    - name: Clean up temp directory
      ansible.builtin.file:
        path: "{{ _work_dir.path }}"
        state: absent
