primary_kubeconfig: ""
secondary_kubeconfig: ""
s3_region: "us-east-2"
s3_endpoint: "s3.amazonaws.com"
cluster_pair_name: "admin-cluster-pair"
target_namespace: "portworx" # the namespace to create the cluster pair in, should be same as portworx namespace for an admin cluster pair
stork_pod_label: "name=stork"
stork_binary_path: "/storkctl/linux/storkctl"
portworx_namespace: "portworx" # the namespace portworx is installed in on the primary and secondary clusters
disable_ssl: true
